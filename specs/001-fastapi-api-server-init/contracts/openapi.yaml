openapi: 3.0.3
info:
  title: PFAG Health API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns status ok if the server is running
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
